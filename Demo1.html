<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Temperature Demo</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #252526;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #fff;
            text-align: center;
            font-family: sans-serif;
        }
        .controls {
            margin-bottom: 20px;
            font-family: sans-serif;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        input[type="range"] {
            flex-grow: 1;
            margin: 0 15px;
        }
        .options-list {
            position: relative;
            margin-bottom: 20px;
        }
        .option-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            position: relative;
            height: 24px;
        }
        .arrow {
            width: 20px;
            color: #4CAF50;
            font-weight: bold;
            visibility: hidden;
        }
        .word {
            width: 80px;
            font-weight: bold;
            color: #fff;
        }
        .bar-container {
            flex-grow: 1;
            background-color: #333;
            height: 100%;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .bar {
            background-color: #007acc;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .percent {
            width: 50px;
            text-align: right;
            font-weight: bold;
            color: #fff;
            margin-left: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-family: sans-serif;
            font-weight: bold;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background-color: #0098ff;
        }
        .history {
            margin-top: 20px;
            font-family: sans-serif;
            font-size: 14px;
        }
        .history-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .history-item {
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            color: #4CAF50;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Token Sampling Demo</h2>
    
    <div class="controls">
        <div class="slider-container">
            <label for="tempSlider">Temperature:</label>
            <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="1.0">
            <span id="tempValue">1.0</span>
        </div>
    </div>

    <div class="options-list" id="optionsList">
        <!-- Rows generated by JS -->
    </div>

    <button id="generateBtn">Generate Next Token</button>

    <div class="history">
        <div><strong>Selection History:</strong></div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
    const baseData = [
        { word: "option", prob: 0.42 },
        { word: "popular", prob: 0.21 },
        { word: "vehicle", prob: 0.16 },
        { word: "good", prob: 0.09 },
        { word: "choice", prob: 0.07 },
        { word: "example", prob: 0.03 },
        { word: "thing", prob: 0.01 }
    ];

    let currentProbs = [];
    let isAnimating = false;

    const optionsListEl = document.getElementById('optionsList');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');
    const generateBtn = document.getElementById('generateBtn');
    const historyList = document.getElementById('historyList');

    function init() {
        baseData.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'option-row';
            row.innerHTML = `
                <div class="arrow" id="arrow-${index}">></div>
                <div class="word">${item.word}</div>
                <div class="bar-container">
                    <div class="bar" id="bar-${index}"></div>
                </div>
                <div class="percent" id="percent-${index}">0%</div>
            `;
            optionsListEl.appendChild(row);
        });
        updateProbabilities();
    }

    function updateProbabilities() {
        const temp = parseFloat(tempSlider.value);
        tempValue.innerText = temp.toFixed(1);

        if (temp === 0) {
            let maxIndex = 0;
            for (let i = 1; i < baseData.length; i++) {
                if (baseData[i].prob > baseData[maxIndex].prob) maxIndex = i;
            }
            currentProbs = baseData.map((_, i) => i === maxIndex ? 1 : 0);
        } else {
            const adjusted = baseData.map(item => Math.pow(item.prob, 1 / temp));
            const sum = adjusted.reduce((a, b) => a + b, 0);
            currentProbs = adjusted.map(p => p / sum);
        }

        currentProbs.forEach((prob, index) => {
            const percent = (prob * 100).toFixed(0);
            document.getElementById(`bar-${index}`).style.width = `${percent}%`;
            document.getElementById(`percent-${index}`).innerText = `${percent}%`;
        });
    }

    function weightedRandom(probs) {
        const r = Math.random();
        let sum = 0;
        for (let i = 0; i < probs.length; i++) {
            sum += probs[i];
            if (r <= sum) return i;
        }
        return probs.length - 1;
    }

    function clearArrows() {
        for (let i = 0; i < baseData.length; i++) {
            document.getElementById(`arrow-${i}`).style.visibility = 'hidden';
            document.getElementById(`bar-${i}`).style.backgroundColor = '#007acc';
        }
    }

    function showArrow(index) {
        clearArrows();
        document.getElementById(`arrow-${index}`).style.visibility = 'visible';
        document.getElementById(`bar-${index}`).style.backgroundColor = '#4CAF50';
    }

    generateBtn.addEventListener('click', () => {
        if (isAnimating) return;
        isAnimating = true;
        generateBtn.disabled = true;
        tempSlider.disabled = true;

        let jumps = 0;
        const maxJumps = 20;
        const intervalTime = 75; 

        const jumpInterval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * baseData.length);
            showArrow(randomIndex);
            jumps++;

            if (jumps >= maxJumps) {
                clearInterval(jumpInterval);
                finishGeneration();
            }
        }, intervalTime);
    });

    function finishGeneration() {
        const selectedIndex = weightedRandom(currentProbs);
        showArrow(selectedIndex);

        // Add to history
        const historyItem = document.createElement('div');
        historyItem.className = 'history-item';
        historyItem.innerText = baseData[selectedIndex].word;
        historyList.appendChild(historyItem);

        if (historyList.children.length > 8) {
            historyList.removeChild(historyList.firstChild);
        }

        isAnimating = false;
        generateBtn.disabled = false;
        tempSlider.disabled = false;
    }

    tempSlider.addEventListener('input', updateProbabilities);

    // Initialize
    init();
</script>

</body>
</html>
