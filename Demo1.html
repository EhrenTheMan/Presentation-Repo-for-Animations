<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Temperature Demo</title>
    <style>
        :root {
            --bg: #0f2030;
            --text: #d4d4d4;
            --panel: rgba(18, 34, 50, 0.95);
            --panel-2: rgba(12, 24, 37, 0.85);
            --line: #333;
            --line-strong: #555;
            --muted: #888;
            --strong: #fff;
            --accent: #007acc;
            --accent-hover: #0098ff;
            --btn-bg: #333;
            --btn-hover: #444;
            --btn-text: #ccc;
            --bar-track: #333;
            --bar: #007acc;
            --success: #4CAF50;
            --user-bubble: #005c4b;
            --ai-bubble: #333;
            --history-bg: #333;
            --history-text: #4CAF50;
            --tooltip-bg: #2b2b2b;
            --glossary-bg: #161d31;
            --glossary-item: #1d2740;
            --glossary-item-line: #304168;
            --glossary-term: #6fd1ff;
            --glossary-detail: #9eb1df;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background:
                radial-gradient(800px 500px at 10% -5%, rgba(31, 162, 255, 0.22), transparent 70%),
                radial-gradient(900px 600px at 95% 8%, rgba(24, 192, 137, 0.16), transparent 72%),
                linear-gradient(150deg, #081623, #10263a 45%, #1a3950);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }

        /* Hint Banner CSS */
        .hint-banner {
            position: absolute;
            top: 20px;
            background-color: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideIn 0.5s ease forwards 0.5s, fadeOut 0.5s ease forwards 8s;
        }
        .close-hint {
            cursor: pointer;
            font-size: 16px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .close-hint:hover {
            opacity: 1;
        }
        @keyframes slideIn {
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            100% { opacity: 0; visibility: hidden; }
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--line-strong);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
            z-index: 50;
        }
        .back-btn:hover {
            background-color: var(--btn-hover);
            color: var(--strong);
        }

        .theme-dock {
            position: absolute;
            top: 20px;
            left: 130px;
            z-index: 80;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-trigger {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: 1px solid var(--line-strong);
            background-color: var(--btn-bg);
            color: var(--strong);
            cursor: pointer;
            transition: transform 0.18s ease, background-color 0.2s ease, border-color 0.2s ease;
            font-size: 17px;
            line-height: 1;
        }
        .theme-trigger:hover {
            transform: translateY(-1px);
            background-color: var(--btn-hover);
        }
        .theme-options {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            max-width: 0;
            overflow: hidden;
            transform: translateX(-6px);
            transition: max-width 0.25s ease, opacity 0.2s ease, transform 0.2s ease;
        }
        .theme-dock:hover .theme-options,
        .theme-dock:focus-within .theme-options {
            opacity: 1;
            max-width: 260px;
            transform: translateX(0);
        }
        .theme-option {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid var(--line-strong);
            background-color: var(--btn-bg);
            color: var(--strong);
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.16s ease, background-color 0.2s ease, border-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .theme-option:hover {
            transform: translateY(-1px);
            background-color: var(--btn-hover);
        }
        .theme-option.active {
            border-color: var(--accent);
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        .glossary-btn {
            position: absolute;
            right: 20px;
            bottom: 20px;
            padding: 10px 16px;
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            transition: background-color 0.2s;
            z-index: 120;
        }
        .glossary-btn:hover {
            background-color: var(--accent-hover);
        }

        .container {
            background-color: var(--panel);
            padding: 30px;
            border-radius: 14px;
            border: 1px solid rgba(132, 185, 219, 0.26);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.42);
            width: 480px;
        }
        h2 {
            margin-top: 0;
            color: var(--strong);
            text-align: center;
        }
        
        .chat-context {
            background-color: var(--panel-2);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid var(--line);
            font-size: 14px;
        }
        .label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .user-bubble {
            background-color: var(--user-bubble);
            margin-left: 20px;
            border-bottom-right-radius: 0;
        }
        .ai-bubble {
            background-color: var(--ai-bubble);
            margin-right: 20px;
            border-bottom-left-radius: 0;
        }

        .controls {
            margin-bottom: 20px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        input[type="range"] {
            flex-grow: 1;
            margin: 0 15px;
        }
        .options-list {
            position: relative;
            margin-bottom: 20px;
        }
        .option-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            position: relative;
            height: 24px;
        }
        .arrow {
            width: 20px;
            color: var(--success);
            font-weight: bold;
            visibility: hidden;
        }
        .word {
            width: 90px;
            font-weight: bold;
            color: var(--strong);
            font-family: 'Courier New', Courier, monospace;
        }
        .bar-container {
            flex-grow: 1;
            background-color: var(--bar-track);
            height: 100%;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .bar {
            background-color: var(--bar);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .percent {
            width: 50px;
            text-align: right;
            font-weight: bold;
            color: var(--strong);
            margin-left: 10px;
        }
        button.action-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: bold;
        }
        button.action-btn:disabled {
            background-color: var(--line-strong);
            cursor: not-allowed;
        }
        button.action-btn:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }
        .history {
            margin-top: 20px;
            font-size: 14px;
        }
        .history-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .history-item {
            background-color: var(--history-bg);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--history-text);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        /* Tooltip CSS */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: pointer;
            border-bottom: 1px dotted var(--muted);
        }
        .tooltip .tooltip-text {
            visibility: hidden;
            width: 220px;
            background-color: var(--tooltip-bg);
            color: var(--strong);
            text-align: center;
            border-radius: 6px;
            padding: 8px 12px;
            position: absolute;
            z-index: 10;
            bottom: 150%;
            left: 50%;
            margin-left: -122px;
            opacity: 0;
            transition: opacity 0.25s ease 1.5s, visibility 0s linear 1.75s;
            font-size: 12px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: normal;
            text-transform: none;
            letter-spacing: normal;
            border: 1px solid var(--line-strong);
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            pointer-events: auto;
        }
        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }
        /* Show immediately on hover */
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.12s ease, visibility 0s;
        }

        /* Glossary Sidebar */
        .glossary-overlay {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: 380px;
            background-color: var(--glossary-bg);
            border-left: 2px solid var(--accent);
            box-shadow: -5px 0 25px rgba(0,0,0,0.7);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .glossary-overlay.open {
            transform: translateX(0);
        }
        .glossary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: var(--accent);
            color: white;
            font-weight: bold;
            font-size: 16px;
        }
        .glossary-close {
            cursor: pointer;
            font-size: 20px;
            background: none;
            border: none;
            color: white;
            padding: 0 4px;
        }
        .glossary-body {
            padding: 12px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .glossary-item {
            margin-bottom: 0;
            background: var(--glossary-item);
            border: 1px solid var(--glossary-item-line);
            border-radius: 8px;
        }
        .glossary-term {
            color: var(--glossary-term);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }
        .glossary-term::after {
            content: '▾';
            font-size: 12px;
            color: var(--glossary-detail);
            transition: transform 0.2s ease;
        }
        .glossary-item.expanded .glossary-term::after {
            transform: rotate(180deg);
        }
        .glossary-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease;
            padding: 0 10px;
        }
        .glossary-item.expanded .glossary-content {
            max-height: 420px;
            padding: 0 10px 10px;
        }
        .glossary-short {
            color: var(--text);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 6px;
        }
        .glossary-detail {
            color: var(--glossary-detail);
            font-size: 12px;
            line-height: 1.6;
        }
        .glossary-detail strong {
            color: var(--text);
        }

        @media (max-width: 680px) {
            .theme-dock {
                left: 20px;
                top: 64px;
            }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">← Back</a>
<div class="theme-dock" aria-label="Theme picker">
    <button class="theme-trigger" type="button" aria-label="Theme options">🎨</button>
    <div class="theme-options">
        <button class="theme-option active" type="button" data-theme="current" title="Current theme" aria-label="Current theme">🧩</button>
        <button class="theme-option" type="button" data-theme="amoled" title="AMOLED dark" aria-label="AMOLED dark">🌑</button>
        <button class="theme-option" type="button" data-theme="light" title="Light mode" aria-label="Light mode">☀️</button>
    </div>
</div>
<button class="glossary-btn" onclick="openGlossary()">📖 Glossary</button>

<div class="hint-banner" id="hintBanner">
    💡 Hint: Open glossary by clicking the mini-definition bubble or the Glossary button (bottom-right).
    <span class="close-hint" onclick="document.getElementById('hintBanner').style.display='none'">✕</span>
</div>

<div class="glossary-overlay" id="glossaryPanel">
    <div class="glossary-header">
        <span>📖 Glossary</span>
        <button class="glossary-close" onclick="closeGlossary()">✕</button>
    </div>
    <div class="glossary-body" id="glossaryBody">
        <!-- Glossary items will be injected here -->
    </div>
</div>

<div class="container">
    <h2>Token Sampling Demo</h2>
    
    <div class="chat-context">
        <div class="label">User</div>
        <div class="bubble user-bubble">I am looking for a reliable SUV.</div>
        <div class="label">AI Assistant</div>
        <div class="bubble ai-bubble" id="aiAssistantBubble">The Jeep Grand Cherokee is a great <span style="display:inline-block; width:10px; height:2px; background:#fff; vertical-align:bottom; animation: blink 1s infinite;"></span></div>
    </div>

    <div class="controls">
        <div class="slider-container">
            <label for="tempSlider">
                <span class="tooltip" data-glossary="temperature">Temperature
                    <span class="tooltip-text">Temperature is a number (0–2) that controls randomness by reshaping the probability distribution before sampling.</span>
                </span>:
            </label>
            <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="1.0">
            <span id="tempValue">1.0</span>
        </div>
    </div>

    <div class="options-list" id="optionsList">
        </div>

    <button id="generateBtn" class="action-btn">Generate <span class="tooltip" data-glossary="token" style="border-bottom-color:#fff;">Token<span class="tooltip-text">A token is the smallest unit of text an LLM reads and generates — it can be a whole word, part of a word, or punctuation.</span></span></button>

    <div class="history">
        <div><strong>Generation History:</strong></div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
    const baseData = [
        { word: " choice", prob: 0.42 },
        { word: " vehicle", prob: 0.21 },
        { word: " option", prob: 0.16 },
        { word: " car", prob: 0.09 },
        { word: " investment", prob: 0.07 },
        { word: " example", prob: 0.03 },
        { word: " buy", prob: 0.01 }
    ];

    let currentProbs = [];
    let isAnimating = false;

    const optionsListEl = document.getElementById('optionsList');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');
    const generateBtn = document.getElementById('generateBtn');
    const historyList = document.getElementById('historyList');
    const aiAssistantBubble = document.getElementById('aiAssistantBubble');
    const aiStarterText = 'The Jeep Grand Cherokee is a great';
    const themeButtons = Array.from(document.querySelectorAll('.theme-option[data-theme]'));

    const themePresets = {
        current: {
            '--bg': '#1e1e1e',
            '--text': '#d4d4d4',
            '--panel': '#252526',
            '--panel-2': '#1e1e1e',
            '--line': '#333',
            '--line-strong': '#555',
            '--muted': '#888',
            '--strong': '#fff',
            '--accent': '#007acc',
            '--accent-hover': '#0098ff',
            '--btn-bg': '#333',
            '--btn-hover': '#444',
            '--btn-text': '#ccc',
            '--bar-track': '#333',
            '--bar': '#007acc',
            '--success': '#4CAF50',
            '--history-bg': '#333',
            '--history-text': '#4CAF50',
            '--tooltip-bg': '#2b2b2b',
            '--glossary-bg': '#161d31',
            '--glossary-item': '#1d2740',
            '--glossary-item-line': '#304168',
            '--glossary-term': '#6fd1ff',
            '--glossary-detail': '#9eb1df'
        },
        amoled: {
            '--bg': '#000000',
            '--text': '#e5e5e5',
            '--panel': '#050505',
            '--panel-2': '#000000',
            '--line': '#141414',
            '--line-strong': '#262626',
            '--muted': '#8f8f8f',
            '--strong': '#ffffff',
            '--accent': '#00a6ff',
            '--accent-hover': '#27b6ff',
            '--btn-bg': '#0f0f0f',
            '--btn-hover': '#1c1c1c',
            '--btn-text': '#dfdfdf',
            '--bar-track': '#141414',
            '--bar': '#00a6ff',
            '--success': '#3dd87b',
            '--user-bubble': '#00362b',
            '--ai-bubble': '#121212',
            '--history-bg': '#101010',
            '--history-text': '#56e08e',
            '--tooltip-bg': '#0d0d0d',
            '--glossary-bg': '#050914',
            '--glossary-item': '#0e1422',
            '--glossary-item-line': '#23314e',
            '--glossary-term': '#78d7ff',
            '--glossary-detail': '#9fb7e3'
        },
        light: {
            '--bg': '#f4f7fb',
            '--text': '#1f2b38',
            '--panel': '#ffffff',
            '--panel-2': '#f7f9fc',
            '--line': '#d6dfeb',
            '--line-strong': '#bcc9db',
            '--muted': '#5b6b7f',
            '--strong': '#0f1720',
            '--accent': '#1c78d1',
            '--accent-hover': '#2a8ae8',
            '--btn-bg': '#ffffff',
            '--btn-hover': '#eaf1fa',
            '--btn-text': '#1f2b38',
            '--bar-track': '#e5edf7',
            '--bar': '#1c78d1',
            '--success': '#249a58',
            '--user-bubble': '#d9efe6',
            '--ai-bubble': '#eef4fb',
            '--history-bg': '#eef4fb',
            '--history-text': '#1d8b4f',
            '--tooltip-bg': '#f0f4fb',
            '--glossary-bg': '#f7f9fd',
            '--glossary-item': '#ffffff',
            '--glossary-item-line': '#d3deed',
            '--glossary-term': '#1d6db8',
            '--glossary-detail': '#4e6486'
        }
    };

    function applyThemeVars(vars) {
        Object.entries(vars).forEach(([key, value]) => {
            document.documentElement.style.setProperty(key, value);
        });
    }

    function setThemeActive(key) {
        themeButtons.forEach((btn) => {
            btn.classList.toggle('active', btn.dataset.theme === key);
        });
    }

    function applyPresetTheme(key) {
        const preset = themePresets[key];
        if (!preset) return;
        applyThemeVars(preset);
        setThemeActive(key);
    }

    function initThemePicker() {
        themeButtons.forEach((btn) => {
            btn.addEventListener('click', () => applyPresetTheme(btn.dataset.theme));
        });
    }

    function init() {
        baseData.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'option-row';
            row.innerHTML = `
                <div class="arrow" id="arrow-${index}">></div>
                <div class="word">${item.word}</div>
                <div class="bar-container">
                    <div class="bar" id="bar-${index}"></div>
                </div>
                <div class="percent" id="percent-${index}">0%</div>
            `;
            optionsListEl.appendChild(row);
        });
        updateProbabilities();
        populateGlossary();
    }

    function updateProbabilities() {
        const temp = parseFloat(tempSlider.value);
        tempValue.innerText = temp.toFixed(1);

        if (temp === 0) {
            let maxIndex = 0;
            for (let i = 1; i < baseData.length; i++) {
                if (baseData[i].prob > baseData[maxIndex].prob) maxIndex = i;
            }
            currentProbs = baseData.map((_, i) => i === maxIndex ? 1 : 0);
        } else {
            const adjusted = baseData.map(item => Math.pow(item.prob, 1 / temp));
            const sum = adjusted.reduce((a, b) => a + b, 0);
            currentProbs = adjusted.map(p => p / sum);
        }

        currentProbs.forEach((prob, index) => {
            const percent = (prob * 100).toFixed(0);
            document.getElementById(`bar-${index}`).style.width = `${percent}%`;
            document.getElementById(`percent-${index}`).innerText = `${percent}%`;
        });
    }

    function weightedRandom(probs) {
        const r = Math.random();
        let sum = 0;
        for (let i = 0; i < probs.length; i++) {
            sum += probs[i];
            if (r <= sum) return i;
        }
        return probs.length - 1;
    }

    function clearArrows() {
        for (let i = 0; i < baseData.length; i++) {
            document.getElementById(`arrow-${i}`).style.visibility = 'hidden';
            document.getElementById(`bar-${i}`).style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--bar').trim();
        }
    }

    function showArrow(index) {
        clearArrows();
        document.getElementById(`arrow-${index}`).style.visibility = 'visible';
        document.getElementById(`bar-${index}`).style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--success').trim();
    }

    let randomnessHintShown = false;
    let generatePressCount = 0;

    function showRandomnessHint() {
        if (randomnessHintShown) return;
        randomnessHintShown = true;
        const banner = document.createElement('div');
        banner.className = 'hint-banner';
        banner.style.top = '80px';
        banner.style.animation = 'slideIn 0.3s ease forwards';
        banner.innerHTML = `
            💡 Remeber: True randomness doesn't always "look" random! The same word might get picked multiple times in a row.
            <span class="close-hint" onclick="this.parentElement.remove()">✕</span>
        `;
        document.body.appendChild(banner);
    }

    setTimeout(showRandomnessHint, 60000);

    generateBtn.addEventListener('click', () => {
        generatePressCount++;
        if (generatePressCount >= 5) {
            showRandomnessHint();
        }

        if (isAnimating) return;
        isAnimating = true;
        generateBtn.disabled = true;
        tempSlider.disabled = true;
        aiAssistantBubble.innerHTML = `${aiStarterText} <span style="display:inline-block; width:10px; height:2px; background:#fff; vertical-align:bottom; animation: blink 1s infinite;"></span>`;

        let jumps = 0;
        const maxJumps = 20;
        const intervalTime = 75; 

        const jumpInterval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * baseData.length);
            showArrow(randomIndex);
            jumps++;

            if (jumps >= maxJumps) {
                clearInterval(jumpInterval);
                finishGeneration();
            }
        }, intervalTime);
    });

    function finishGeneration() {
        const selectedIndex = weightedRandom(currentProbs);
        showArrow(selectedIndex);
        const selectedWord = baseData[selectedIndex].word;
        aiAssistantBubble.innerHTML = `${aiStarterText}${selectedWord} <span style="display:inline-block; width:10px; height:2px; background:#fff; vertical-align:bottom; animation: blink 1s infinite;"></span>`;

        const historyItem = document.createElement('div');
        historyItem.className = 'history-item';
        historyItem.innerText = selectedWord;
        historyList.appendChild(historyItem);

        if (historyList.children.length > 8) {
            historyList.removeChild(historyList.firstChild);
        }

        isAnimating = false;
        generateBtn.disabled = false;
        tempSlider.disabled = false;
    }

    tempSlider.addEventListener('input', updateProbabilities);

    // --- Glossary System ---
    const glossaryEntries = {
        temperature: {
            term: 'Temperature',
            short: 'Temperature is a single number (typically 0 to 2) that you pass to the model as a setting. It mathematically reshapes the probability distribution over the next token before one is sampled.',
            detail: '<strong>How it works:</strong> The model first computes raw scores ("logits") for every possible next word. Temperature divides those scores before converting them into probabilities via softmax.<br><br><strong>Low temp (e.g. 0.1):</strong> Dividing by a small number makes high scores much higher and low scores nearly zero — the model almost always picks the top word.<br><br><strong>High temp (e.g. 2.0):</strong> Dividing by a large number compresses the differences — even unlikely words get a real chance of being picked.<br><br><strong>In short:</strong> Temperature does not change <em>what</em> the model knows; it changes <em>how boldly</em> it picks from what it knows.'
        },
        token: {
            term: 'Token',
            short: 'A token is the smallest unit of text that an LLM reads and generates. Tokens can be whole words, parts of words, or punctuation.',
            detail: '<strong>Examples:</strong> "hello" = 1 token, "unbelievable" might be split into "un" + "believ" + "able" = 3 tokens.<br><br>The model\'s entire vocabulary is a fixed list of tokens (typically 30k–100k entries). Generation works by predicting one token at a time, appending it, and repeating.'
        },
        probabilities: {
            term: 'Probabilities',
            short: 'Before producing the next token, the model assigns a probability (0%–100%) to every token in its vocabulary, representing how likely each one is to come next.',
            detail: '<strong>Where they come from:</strong> The model\'s neural network outputs a raw score ("logit") for each vocabulary entry. A softmax function converts these scores into a proper probability distribution that sums to 100%.<br><br>Temperature is applied <em>before</em> softmax, which is how it reshapes these probabilities.'
        },
        stoptoken: {
            term: 'Stop Token',
            short: 'A stop token (e.g. <|stop|> or <|endoftext|>) is a special entry in the model\'s vocabulary that signals "I am done generating." The model learns during training when to predict it.',
            detail: '<strong>Why it exists:</strong> Without a stop token, the model would generate text forever — it has no built-in sense of "enough." The stop token is trained into the model so it learns to predict it at natural endpoints (end of a sentence, end of an answer).<br><br><strong>How it works:</strong> At each step, the stop token competes with every other token in the probability distribution. When the model predicts it as the most likely next token, generation halts and the stop token is never shown to the user.'
        }
    };

    function populateGlossary() {
        const body = document.getElementById('glossaryBody');
        body.innerHTML = '';
        for (const key in glossaryEntries) {
            const entry = glossaryEntries[key];
            const itemDiv = document.createElement('div');
            itemDiv.className = 'glossary-item';
            itemDiv.id = 'glossary-' + key;
            itemDiv.innerHTML = `
                <div class="glossary-term" onclick="toggleGlossaryItem('${key}')">${entry.term}</div>
                <div class="glossary-content" id="glossary-content-${key}">
                    <div class="glossary-short">${entry.short}</div>
                    <div class="glossary-detail">${entry.detail}</div>
                </div>
            `;
            body.appendChild(itemDiv);
        }
    }

    function toggleGlossaryItem(key) {
        const item = document.getElementById('glossary-' + key);
        if (item.classList.contains('expanded')) {
            item.classList.remove('expanded');
        } else {
            item.classList.add('expanded');
        }
    }

    function openGlossary(keyToScroll) {
        document.getElementById('glossaryPanel').classList.add('open');
        if (keyToScroll) {
            setTimeout(() => {
                const el = document.getElementById('glossary-' + keyToScroll);
                if (el) {
                    el.classList.add('expanded');
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 220);
        }
    }

    function closeGlossary() {
        document.getElementById('glossaryPanel').classList.remove('open');
    }

    // Global Click Listener for Tooltips and click-off logic
    document.addEventListener('click', function(e) {
        const tooltipBox = e.target.closest('.tooltip-text');
        const glossaryPanel = document.getElementById('glossaryPanel');

        // Only clicking the mini-definition bubble opens the glossary
        if (tooltipBox) {
            const tooltip = tooltipBox.closest('.tooltip[data-glossary]');
            if (tooltip) {
                e.preventDefault();
                e.stopPropagation();
                openGlossary(tooltip.getAttribute('data-glossary'));

                const hintBanner = document.getElementById('hintBanner');
                if (hintBanner) hintBanner.style.display = 'none';
                return;
            }
        }

        // Close glossary if clicking outside of it
        if (glossaryPanel && glossaryPanel.classList.contains('open')) {
            if (!e.target.closest('#glossaryPanel') && !e.target.closest('.glossary-btn')) {
                closeGlossary();
            }
        }
    });

    // Initialize
    initThemePicker();
    applyPresetTheme('current');
    init();

</script>

</body>
</html>
