<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Animations Showcase</title>
    <style>
        :root {
            --bg-a: #081623;
            --bg-b: #10263a;
            --bg-c: #1a3950;
            --line: rgba(132, 185, 219, 0.26);
            --text: #edf7ff;
            --muted: #acc5d8;
            --accent: #1fa2ff;
            --accent-2: #18c089;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background:
                radial-gradient(800px 500px at 10% -5%, rgba(31, 162, 255, 0.22), transparent 70%),
                radial-gradient(900px 600px at 95% 8%, rgba(24, 192, 137, 0.16), transparent 72%),
                linear-gradient(150deg, var(--bg-a), var(--bg-b) 45%, var(--bg-c));
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: linear-gradient(180deg, rgba(18, 34, 50, 0.95), rgba(10, 21, 33, 0.95));
            padding: 40px;
            border-radius: 22px;
            border: 1px solid var(--line);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.42);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            margin-top: 0;
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            color: var(--muted);
            margin-bottom: 30px;
            line-height: 1.5;
            font-size: 16px;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 16px 20px;
            background: linear-gradient(120deg, rgba(24, 139, 208, 0.96), rgba(32, 180, 242, 0.95));
            color: white;
            text-decoration: none;
            border-radius: 14px;
            border: 1px solid rgba(170, 229, 255, 0.8);
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
            box-shadow: 0 10px 22px rgba(8, 51, 76, 0.32);
        }
        .btn:hover {
            background: linear-gradient(120deg, rgba(33, 157, 232, 0.98), rgba(60, 199, 255, 0.98));
            transform: translateY(-2px);
            box-shadow: 0 14px 26px rgba(4, 25, 42, 0.46);
        }
        .btn:active {
            transform: translateY(0);
        }
        .github-link {
            margin-top: 30px;
            font-size: 14px;
            color: #9cb9cf;
            text-decoration: none;
        }
        .github-link:hover {
            color: #d5ecff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LLM Animations</h1>
        <p>Welcome! Choose an interactive demonstration below to see how Large Language Models generate text behind the scenes.</p>
        
        <div class="nav-links">
            <a href="Demo1.html" class="btn">Demo 1: Temperature & Sampling</a>
            <a href="Demo2.html" class="btn">Demo 2: The Stop-Token</a>
            <a href="Demo3.html" class="btn">Demo 3: Full AI Thinking Walkthrough</a>
        </div>

        <a href="https://github.com/ehrentheman/Presentation-Repo-for-Animations" class="github-link" target="_blank">
            View Repository on GitHub
        </a>
    </div>

</body>
</html>
