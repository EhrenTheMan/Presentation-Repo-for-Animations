<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Animations Showcase</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            margin-top: 0;
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 30px;
            line-height: 1.5;
            font-size: 16px;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 16px 20px;
            background-color: #007acc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .btn:hover {
            background-color: #0098ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .github-link {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
            text-decoration: none;
        }
        .github-link:hover {
            color: #aaa;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LLM Animations</h1>
        <p>Welcome! Choose an interactive demonstration below to see how Large Language Models generate text behind the scenes.</p>
        
        <div class="nav-links">
            <a href="Demo1.html" class="btn">Demo 1: Temperature & Sampling</a>
            <a href="Demo2.html" class="btn">Demo 2: The Stop-Token</a>
            <a href="Demo3.html" class="btn">Demo 3: Live Generation Engine</a>
            <a href="Demo4.html" class="btn">Demo 4: Full AI Thinking Walkthrough</a>
        </div>

        <a href="https://github.com/ehrentheman/Presentation-Repo-for-Animations" class="github-link" target="_blank">
            View Repository on GitHub
        </a>
    </div>

</body>
</html>
